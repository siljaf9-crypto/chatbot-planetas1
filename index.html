<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chatbot de los Planetas - 4º Primaria</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to bottom, #000428, #004e92);
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    .planetas {
      font-size: 30px;
      margin: 20px;
    }
    .chat {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
      width: 320px;
      margin: auto;
    }
    input {
      width: 75%;
      padding: 5px;
    }
    button {
      padding: 5px 10px;
      background-color: #004e92;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>🌍 Aprende el Sistema Solar</h1>
<p>Chatbot educativo para 4º de Primaria</p>

<div class="planetas">
  ☀️ 🌍 🪐 🌕 🚀
</div>

<div class="chat">
  <p id="respuesta">Escribe una pregunta sobre los planetas 😊</p>
  <input type="text" id="pregunta" placeholder="Ej: ¿Qué es Marte?">
  <button onclick="responder()">Enviar</button>
</div>

<script>
function responder() {
  let pregunta = document.getElementById("pregunta").value.toLowerCase();
  let respuesta = "No lo entiendo todavía 🤔. Prueba con otra pregunta.";

  if (pregunta.includes("sol")) {
    respuesta = "El Sol es una estrella y nos da luz y calor ☀️";
  } else if (pregunta.includes("tierra")) {
    respuesta = "La Tierra es el planeta donde vivimos 🌍";
  } else if (pregunta.includes("luna")) {
    respuesta = "La Luna es el satélite de la Tierra 🌕";
  } else if (pregunta.includes("marte")) {
    respuesta = "Marte es el planeta rojo 🔴";
  } else if (pregunta.includes("jupiter")) {
    respuesta = "Júpiter es el planeta más grande del sistema solar 🪐";
  } else if (pregunta.includes("saturno")) {
    respuesta = "Saturno tiene anillos muy bonitos 💍";
  } else if (pregunta.includes("mercurio")) {
    respuesta = "Mercurio es el planeta más cercano al Sol 🔥";
  } else if (pregunta.includes("venus")) {
    respuesta = "Venus es muy caliente y brillante ✨";
  } else if (pregunta.includes("urano")) {
    respuesta = "Urano gira de lado 🔵";
  } else if (pregunta.includes("neptuno")) {
    respuesta = "Neptuno es muy frío y azul ❄️";
  } else if (pregunta.includes("planetas")) {
    respuesta = "Hay 8 planetas en el sistema solar 🌌";
  }

  document.getElementById("respuesta").innerText = respuesta;
}
</script>

</body>
</html>
